apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api
  namespace: default
  labels:
    app: devops-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-api
  template:
    metadata:
      labels:
        app: devops-api
    spec:
      containers:
      - name: devops-api
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: devops-api-svc
  namespace: default
spec:
  selector:
    app: devops-api
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
