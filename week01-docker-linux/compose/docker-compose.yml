version: "3.9"

services:
  api:
    build: ../app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devops
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d devops"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
