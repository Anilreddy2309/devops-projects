name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: week03-cicd/package-lock.json

      - name: Install dependencies
        run: |
          cd week03-cicd
          npm ci

      - name: Run tests
        run: |
          cd week03-cicd
          npm test

  build:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd week03-cicd
          docker build -t devops-api:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
